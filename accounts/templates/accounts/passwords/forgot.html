{% extends "includes/layout.html" %}
{% load static %}
{% block title %}Forgot Password | {{ site_name }}{% endblock %}

{% block content %}

<section style="padding: 0;">
    <div class="login_div">
        <div class="login_outer">
            <h2 class="head_login">Forgot password</h2>
            <div class="login_inner">
                <form method="POST" id="forgotPasswordForm">
                    {% csrf_token %}
                    <div class="login_form">
                        <input type="email" name="email" class="login_input" placeholder="Enter your email address" required>
                    </div>
                    <button type="submit" class="btn btn_login">Send reset link</button>
                </form>
                <p class="para_login2">Remembered? <a href="{% url 'user_login' %}">Sign in</a></p>
            </div>
        </div>
    </div>
</section>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("forgotPasswordForm").addEventListener("submit", function () {
            universalLoader("Sending reset link...", "Please wait while we process your request");
        });
    });
</script>
{% endblock %}
