{% load static %}
{% if page_obj.has_previous %}
  <a href="?page={{ page_obj.previous_page_number }}" class="arrow_t">
    <svg xmlns="http://www.w3.org/2000/svg" width="7" height="12" viewBox="0 0 7 12" fill="none">
      <path d="M6 11L1 6L6 1" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
{% else %}
  <span class="arrow_t">
    <svg xmlns="http://www.w3.org/2000/svg" width="7" height="12" viewBox="0 0 7 12" fill="none">
      <path d="M6 11L1 6L6 1" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
{% endif %}
{% for num in page_obj.paginator.page_range %}
  {% if num == page_obj.number %}
    <div class="eash_pag active_wala">{{ num }}</div>
  {% else %}
    <a href="?page={{ num }}" class="eash_pag">{{ num }}</a>
  {% endif %}
{% endfor %}
{% if page_obj.has_next %}
  <a href="?page={{ page_obj.next_page_number }}" class="arrow_t">
    <svg xmlns="http://www.w3.org/2000/svg" width="7" height="12" viewBox="0 0 7 12" fill="none">
      <path d="M1 1L6 6L1 11" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
{% else %}
  <span class="arrow_t">
    <svg xmlns="http://www.w3.org/2000/svg" width="7" height="12" viewBox="0 0 7 12" fill="none">
      <path d="M1 1L6 6L1 11" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
{% endif %}
