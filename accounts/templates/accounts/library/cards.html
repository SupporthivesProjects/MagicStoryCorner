{% load static %}
{% for story in stories %}
  <div class="full_cardd">
    <div class="book_covert">
      {% if story.image %}
        <img src="{{ story.image.url }}" alt="{{ story.title }}" class="img-fluid">
      {% else %}
        <img src="{% static 'media/BookCover.jpeg' %}" alt="Default Cover" class="img-fluid">
      {% endif %}
    </div>
    <div class="bottom_card_div">
      <h1>
        {% if story.title|length > 25 %}{{ story.title|slice:":25" }}...{% else %}{{ story.title }}{% endif %}
      </h1>
      <a href="{% url 'library_view' story.slug %}">Find out more</a>
    </div>
  </div>
{% empty %}
  <p class="text-muted text-center w-100 p-4">No stories found in your library.</p>
{% endfor %}
