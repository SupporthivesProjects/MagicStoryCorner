{% extends "includes/layout.html" %}
{% load static %}
{% block title %} Payment Failed | {{ site_name }} {% endblock %}
{% block content %}

<section style="padding:0%;">
  <div class="check_e">
    <img src="{% static 'media/check_e_octo.png' %}" alt="" class="check_e_img mo_none">
    <img src="{% static 'media/check_e_blowfish.png' %}" alt="" class="desk_none check_e_blwfsh">
    <img src="{% static 'media/check_e_mo_oct.png' %}" alt="" class="desk_none check_e_octo">
    <div class="check_e_outer">
      <div class="check_e_inner1">
        <h3 class="head_check_e">Payment Error!</h3>
        <p class="para_check_e">Something went wrong! Please try again later.</p>
      </div>
      <div class="check_e_inner2">
        <a href="{% url 'billing_information' %}" class="btn btn_check_s_y">Try again</a>
        <a href="{% url 'home' %}" class="btn btn_check_s_b">Return home</a>
      </div>
    </div>
  </div>
</section>

{% endblock %}
{% block extra_js %}{% endblock %}
