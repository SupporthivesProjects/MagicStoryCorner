{% load static %}
<script>
    const _GL_LOGO_URL = "{% static 'media/logo.svg' %}";

    function generationLoader(show = true, message = 'Creating your magical story...') {
        let loader = document.getElementById('gl-generation-loader');

        if (!loader && show) {
            loader = document.createElement('div');
            loader.id = 'gl-generation-loader';

            const style = document.createElement('style');
            style.innerHTML = `
            #gl-generation-loader {
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                background: rgba(10, 6, 25, 0.72);
                backdrop-filter: blur(4px);
            }

            #gl-generation-loader .gl-card {
                background: #ffffff;
                border-radius: 28px;
                padding: 48px 44px 40px;
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 380px;
                max-width: 92vw;
                box-shadow: 0 24px 64px rgba(0,0,0,0.35);
                position: relative;
                overflow: hidden;
                animation: gl-card-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            @keyframes gl-card-in {
                from { opacity: 0; transform: scale(0.82) translateY(24px); }
                to   { opacity: 1; transform: scale(1) translateY(0); }
            }

            /* top golden accent bar */
            #gl-generation-loader .gl-card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 5px;
                background: linear-gradient(90deg, #FFCE3C, #FFA500, #FFCE3C);
                background-size: 200% 100%;
                animation: gl-bar-slide 2s linear infinite;
            }
            @keyframes gl-bar-slide {
                0%   { background-position: 0% 0%; }
                100% { background-position: 200% 0%; }
            }

            /* logo */
            #gl-generation-loader .gl-logo {
                width: 90px;
                height: 90px;
                object-fit: contain;
                margin-bottom: 22px;
                animation: gl-float 3s ease-in-out infinite;
                filter: drop-shadow(0 8px 18px rgba(255, 206, 60, 0.45));
            }
            @keyframes gl-float {
                0%, 100% { transform: translateY(0px); }
                50%       { transform: translateY(-10px); }
            }

            /* message text */
            #gl-generation-loader .gl-message {
                font-family: "LEMON MILK", "Sen", sans-serif;
                font-weight: 700;
                font-size: 17px;
                color: #1A1033;
                text-align: center;
                margin: 0 0 28px;
                letter-spacing: 0.5px;
                line-height: 1.4;
            }

            /* progress bar */
            #gl-generation-loader .gl-track {
                width: 100%;
                height: 10px;
                background: #F0EBD8;
                border-radius: 20px;
                overflow: hidden;
            }
            #gl-generation-loader .gl-bar {
                height: 100%;
                background: linear-gradient(90deg, #FFCE3C 0%, #FFA500 50%, #FFCE3C 100%);
                background-size: 200% 100%;
                border-radius: 20px;
                animation: gl-progress 2.4s ease-in-out infinite, gl-bar-shine 2.4s linear infinite;
            }
            @keyframes gl-progress {
                0%   { width: 20%; }
                50%  { width: 80%; }
                100% { width: 20%; }
            }
            @keyframes gl-bar-shine {
                0%   { background-position: 0% 0%; }
                100% { background-position: 200% 0%; }
            }

            /* floating stars */
            #gl-generation-loader .gl-star {
                position: absolute;
                width: 6px; height: 6px;
                background: #FFCE3C;
                clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
                animation: gl-star-rise linear infinite;
                opacity: 0;
            }
            @keyframes gl-star-rise {
                0%   { transform: translateY(0) scale(0.5) rotate(0deg);   opacity: 0; }
                15%  { opacity: 0.9; }
                85%  { opacity: 0.9; }
                100% { transform: translateY(-90px) scale(1.2) rotate(180deg); opacity: 0; }
            }
            `;
            document.head.appendChild(style);

            /* generate floating stars */
            let starsHTML = '';
            for (let i = 0; i < 8; i++) {
                const left  = 10 + Math.random() * 80;
                const delay = (Math.random() * 2).toFixed(2);
                const dur   = (1.8 + Math.random() * 1.4).toFixed(2);
                const size  = 5 + Math.floor(Math.random() * 6);
                starsHTML += `<div class="gl-star" style="left:${left}%;bottom:20px;width:${size}px;height:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;"></div>`;
            }

            loader.innerHTML = `
            <div class="gl-card">
                ${starsHTML}
                <img class="gl-logo" src="${_GL_LOGO_URL}" alt="Magic Story Corner">
                <p class="gl-message">${message}</p>
                <div class="gl-track">
                    <div class="gl-bar"></div>
                </div>
            </div>
            `;

            document.body.appendChild(loader);
        }

        if (loader) {
            loader.style.display = show ? 'flex' : 'none';
            if (show && message) {
                const msg = loader.querySelector('.gl-message');
                if (msg) msg.textContent = message;
            }
        }
    }
</script>
