<script>
  function universalLoader(arg1, arg2) {
    let loader = document.getElementById('universal-loader');

    if (arg1 === false) {
        if (loader) loader.style.display = 'none';
        return;
    }

    const title = arg1 || '';
    const message = arg2 || '';

    if (!loader) {
        loader = document.createElement('div');
        loader.id = 'universal-loader';

        const style = document.createElement('style');
        style.innerHTML = `
            #universal-loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(3, 5, 39, 0.55);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            #universal-loader .loader-box {
                background: #FFFFFF;
                padding: 36px 48px;
                border-radius: 0px;
                display: flex;
                flex-direction: column;
                align-items: center;
                box-shadow: 0 8px 40px rgba(3, 5, 39, 0.18);
                min-width: 220px;
                border-top: 4px solid #FFC760;
            }

            #universal-loader .loader-spinner {
                width: 48px;
                height: 48px;
                border: 4px solid rgba(255, 199, 96, 0.25);
                border-top: 4px solid #FFC760;
                border-radius: 50%;
                animation: ul-spin 0.8s linear infinite;
                margin-bottom: 20px;
            }

            @keyframes ul-spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            #universal-loader .loader-title {
                font-family: "LEMON MILK", sans-serif;
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 0.72px;
                color: #030527;
                margin: 0 0 8px 0;
                text-align: center;
                text-transform: uppercase;
            }

            #universal-loader .loader-message {
                font-family: Sen, sans-serif;
                font-size: 14px;
                color: #383838;
                text-align: center;
                font-weight: 400;
                margin: 0;
                line-height: 1.6;
            }
        `;
        document.head.appendChild(style);

        loader.innerHTML = `
            <div class="loader-box">
                <div class="loader-spinner"></div>
                <h2 class="loader-title">${title}</h2>
                <p class="loader-message">${message}</p>
            </div>
        `;

        document.body.appendChild(loader);
    } else {
        loader.style.display = 'flex';
        loader.querySelector('.loader-title').textContent = title;
        loader.querySelector('.loader-message').textContent = message;
    }
}
</script>
