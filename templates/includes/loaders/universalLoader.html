<script>
  function universalLoader(arg1, arg2) {
    let loader = document.getElementById('universal-loader');

    if (arg1 === false) {
        if (loader) loader.style.display = 'none';
        return;
    }

    const title = arg1 || '';
    const message = arg2 || '';

    if (!loader) {
        loader = document.createElement('div');
        loader.id = 'universal-loader';

        const style = document.createElement('style');
        style.innerHTML = `
            @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

            #universal-loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            #universal-loader .loader-box {
                background: linear-gradient(180deg, #5D3A8E 0%, #7B4AA0 100%);
                padding: 30px 40px;
                border-radius: 24px;
                display: flex;
                flex-direction: column;
                align-items: center;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
                min-width: 200px;
            }

            #universal-loader .loader-spinner {
                width: 50px;
                height: 50px;
                border: 5px solid rgba(255, 206, 60, 0.25);
                border-top: 5px solid #FFCE3C;
                border-radius: 50%;
                animation: ul-spin 0.9s linear infinite;
                margin-bottom: 18px;
            }

            @keyframes ul-spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            #universal-loader .loader-title {
                font-family: 'Fredoka', sans-serif;
                font-size: 22px;
                font-weight: 600;
                color: #FFCE3C;
                margin: 0 0 6px 0;
                text-align: center;
            }

            #universal-loader .loader-message {
                font-family: 'Fredoka', sans-serif;
                font-size: 15px;
                color: #FFFFFF;
                text-align: center;
                font-weight: 400;
                margin: 0;
                opacity: 0.85;
            }
        `;
        document.head.appendChild(style);

        loader.innerHTML = `
            <div class="loader-box">
                <div class="loader-spinner"></div>
                <h2 class="loader-title">${title}</h2>
                <p class="loader-message">${message}</p>
            </div>
        `;

        document.body.appendChild(loader);
    } else {
        loader.style.display = 'flex';
        loader.querySelector('.loader-title').textContent = title;
        loader.querySelector('.loader-message').textContent = message;
    }
}
</script>
